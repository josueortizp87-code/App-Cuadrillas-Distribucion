<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Gestión de Distribución</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://www.eneeutcd.hn/es/dominios/enee.pagegear.co/plantillas/2024/recursos/logo_utcd.svg"
                 alt="ENEE" style="height: 60px; background-color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <h1>SECTOR JUTICALPA - GESTIÓN DE LA RED</h1>
            <p>Desarrollador - Josué Ortiz</p>
        </header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarSubmenu()">
                <i class="fas fa-tools"></i>
                <span>Mantenimiento</span>
            </div>
            <div class="card" onclick="mostrarFormulario('zonificacion')">
                <i class="fas fa-map-marked-alt"></i>
                <span>Zonificaciones</span>
            </div>
        </div>
    </div>

    <div id="submenu-mantenimiento" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlDashboard()"><i class="fas fa-arrow-left"></i> Volver</button>
        <header><h1>MANTENIMIENTO</h1></header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarFormulario('inspeccion')">
                <i class="fas fa-search"></i>
                <span>Inspección</span>
            </div>
            <div class="card" onclick="mostrarFormulario('poda')">
                <i class="fas fa-leaf"></i>
                <span>Poda Comunitaria</span>
            </div>
        </div>
    </div>

    <div id="form-inspeccion-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-arrow-left"></i> Volver</button>
        <h2>REGISTRO DE INSPECCIÓN</h2>
        <form id="form-insp-detalle">
            <label>ID Inspección:</label>
            <input type="text" id="id-insp" readonly class="input-readonly">

            <label>Circuito:</label>
            <select id="circ-insp">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
                <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
                <option>GMC-L377 RS CAMPAMENTO</option>
            </select>

            <label>Nombre de Inspección:</label>
            <input type="text" id="nombre-insp" placeholder="Ej: Poste 45-JUT">

            <label>Fecha:</label>
            <input type="date" id="fecha-insp">

            <label>Prioridad:</label>
            <div class="selector-botones" id="prioridad-insp">
                <button type="button" class="btn-prioridad" onclick="seleccionarPrioridad(this, 'ALTA')">ALTA</button>
                <button type="button" class="btn-prioridad" onclick="seleccionarPrioridad(this, 'MEDIA')">MEDIA</button>
                <button type="button" class="btn-prioridad" onclick="seleccionarPrioridad(this, 'BAJA')">BAJA</button>
            </div>

            <label>Evidencia (3 Fotos):</label>
            <div class="grid-3">
                <div class="foto-input-group"><input type="file" id="insp-f1" onchange="previsualizar(this, 'p-insp-1')"><div id="p-insp-1" class="preview-box"></div></div>
                <div class="foto-input-group"><input type="file" id="insp-f2" onchange="previsualizar(this, 'p-insp-2')"><div id="p-insp-2" class="preview-box"></div></div>
                <div class="foto-input-group"><input type="file" id="insp-f3" onchange="previsualizar(this, 'p-insp-3')"><div id="p-insp-3" class="preview-box"></div></div>
            </div>

            <label>Ubicación:</label>
            <div id="map-insp" style="height: 250px; border-radius: 10px;"></div>
            <p class="coords-text">Coordenadas: <span id="txt-coords-insp">0, 0</span></p>

            <button type="button" class="btn-enviar" onclick="alert('Guardado correctamente')">FINALIZAR REGISTRO</button>
        </form>
    </div>

    <div id="form-poda-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-arrow-left"></i> Volver</button>
        <header><h1>INFORME DE PODA</h1></header>
        <form id="form-poda">
            <label>Circuito:</label>
            <select id="poda-circuito">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
                <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
                <option>GMC-L377 RS CAMPAMENTO</option>
            </select>
            <label>Zona de Trabajo:</label>
            <input type="text" id="poda-zona">
            <label>Fecha:</label>
            <input type="date" id="poda-fecha">
            <label>Trabajo ejecutado (m):</label>
            <div class="grid-3">
                <input type="number" id="m-brecha" placeholder="Brecha">
                <input type="number" id="m-poda" placeholder="Poda">
                <input type="number" id="m-postes" placeholder="Postes">
            </div>
            <label>Responsables:</label>
            <input type="text" id="resp-super" placeholder="Supervisión">
            <input type="text" id="resp-activ" placeholder="Contratista">

            <label>GPS:</label>
            <div id="map-poda" style="height: 180px; border-radius: 8px;"></div>
            <div class="grid-2">
                <button type="button" class="btn-secundario" onclick="marcarGPS('ini')">GPS INICIO</button>
                <button type="button" class="btn-secundario" onclick="marcarGPS('fin')">GPS FINAL</button>
            </div>
            <p class="coords-text" id="coords-display">Inicio: -- | Fin: --</p>
            <button type="button" class="btn-enviar" onclick="generarPDFPoda()">GENERAR INFORME PDF</button>
        </form>
    </div>

    <div id="form-zonificacion-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlDashboard()"><i class="fas fa-arrow-left"></i> Volver</button>
        <header><h1>ZONIFICACIÓN</h1></header>
        <label>Circuito:</label>
        <select id="zonif-circuito">
            <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
            <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            <option>GMC-L377 RS CAMPAMENTO</option>
        </select>
        <label>Comentarios Zona:</label>
        <input type="text" id="zonif-comentario" placeholder="Ej: Levantamiento Calle Principal">

        <div id="map-zonif" style="height: 350px; border-radius: 10px; margin-bottom: 10px;"></div>

        <div class="grid-2">
            <button type="button" class="btn-enviar" style="background:#000;" onclick="abrirModalPunto('EXISTENTE')">+ EXISTENTE</button>
            <button type="button" class="btn-enviar" style="background:#27ae60;" onclick="abrirModalPunto('PROYECTADA')">+ PROYECTADA</button>
        </div>

        <div id="lista-puntos" style="margin-top:15px; color:white;">
            <h3>Puntos registrados:</h3>
            <ul id="ul-puntos" style="padding:0; list-style:none;"></ul>
        </div>

        <button type="button" class="btn-secundario" style="width:100%; margin-top:20px;" onclick="generarPowerPoint()">
            <i class="fas fa-file-powerpoint"></i> GENERAR PPTX
        </button>
    </div>

    <div id="modal-punto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; padding:20px; overflow-y:auto;">
        <div style="background:#1a1a1a; padding:20px; border-radius:10px; max-width:500px; margin:auto;">
            <h2 id="modal-titulo" style="color:white;">Detalle Apoyo</h2>
            <label style="color:white;">Num. Apoyo:</label><input type="text" id="p-apoyo" style="width:100%; margin-bottom:10px;">
            <label style="color:white;">Tipo Poste:</label>
            <select id="p-tipo-poste" style="width:100%; margin-bottom:10px;">
                <option>PC 30FT</option><option>PC 35FT</option><option>PC 40FT</option><option>PC 45FT</option>
                <option>PMA 30FT</option><option>PMA 35FT</option><option>PMA 40FT</option><option>PMA 45FT</option>
                <option>PME 30FT</option><option>PME 35FT</option><option>PME 40FT</option><option>PME 45FT</option>
            </select>
            <label style="color:white;">Estructura:</label><input type="text" id="p-estructura" style="width:100%; margin-bottom:10px;">
            <label style="color:white;">Trafo (kVA):</label>
            <select id="p-trafo" style="width:100%; margin-bottom:10px;">
                <option>N/A</option><option>15 kVA</option><option>25 kVA</option><option>37.5 kVA</option>
                <option>50 kVA</option><option>75 kVA</option><option>100 kVA</option>
            </select>
            <div id="campos-existente-extra" style="display:none;">
                <label style="color:white;">Cant. Clientes:</label><input type="number" id="p-clientes" style="width:100%; margin-bottom:10px;">
                <label style="color:white;">Voltaje:</label><input type="text" id="p-voltaje" style="width:100%; margin-bottom:10px;">
            </div>
            <div class="grid-2">
                <button type="button" class="btn-regresar" onclick="cerrarModal()">Cancelar</button>
                <button type="button" class="btn-enviar" onclick="guardarPunto()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
