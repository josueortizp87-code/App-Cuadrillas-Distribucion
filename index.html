<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Gestión de Distribución</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://logodownload.org/wp-content/uploads/2019/08/enee-logo.png" alt="Logo ENEE" style="height: 50px;">
            <h1>SECTOR JUTICALPA</h1>
            <p>Ing. Josué Ortiz</p>
        </header>

        <div class="grid-menu">
            <div class="card" onclick="mostrarSeccion('mantenimiento')">
                <i class="fas fa-tools"></i>
                <span>Mantenimiento</span>
            </div>
            <div class="card" onclick="mostrarSeccion('operaciones')">
                <i class="fas fa-bolt"></i>
                <span>Operaciones</span>
            </div>
            <div class="card" onclick="mostrarSeccion('poda')">
                <i class="fas fa-tree"></i>
                <span>Poda Comunitaria</span>
            </div>
            <div class="card" onclick="mostrarSeccion('combustible')">
                <i class="fas fa-gas-pump"></i>
                <span>Combustible</span>
            </div>
        </div>
    </div>

    <div id="seccion-formulario" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlInicio()">< i class="fas fa-arrow-left"></i> Regresar</button>
        <h2 id="titulo-actividad">Actividad</h2>

        <div id="map" style="height: 250px; border-radius: 10px; margin-bottom: 15px;"></div>

        <form id="form-inspeccion">
            <label>Circuito:</label>
            <select id="circuito">
                <option>JUT-L379</option>
                <option>JUT-L380</option>
                <option>CAT-L375</option>
            </select>

            <label>Estado de la Tarea:</label>
            <div class="status-buttons">
                <button type="button" class="status-btn">INICIO</button>
                <button type="button" class="status-btn active">EJECUCIÓN</button>
                <button type="button" class="status-btn">FINALIZADO</button>
            </div>

            <label>Observaciones:</label>
            <textarea rows="4"></textarea>

            <button type="button" class="btn-enviar">GUARDAR REPORTE</button>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
