<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE UTCD - Gestión de Campo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://logodownload.org/wp-content/uploads/2019/08/enee-logo.png" alt="Logo ENEE" style="height: 40px;">
            <h1>SECTOR JUTICALPA</h1>
            <p>Ing. Josué Ortiz - UTCD</p>
        </header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarSubmenu()">
                <i class="fas fa-tools"></i>
                <span>Mantenimiento</span>
            </div>
        </div>
    </div>

    <div id="submenu-mantenimiento" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlDashboard()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header><h1>MANTENIMIENTO</h1></header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarFormulario('inspeccion')">
                <i class="fas fa-clipboard-check"></i>
                <span>Inspección</span>
            </div>
            <div class="card" onclick="mostrarFormulario('poda')">
                <i class="fas fa-leaf"></i>
                <span>Poda Comunitaria</span>
            </div>
        </div>
    </div>

    <div id="form-inspeccion-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <h2>REGISTRO DE INSPECCIÓN</h2>
        <form id="form-insp">
            <label>ID Inspección:</label>
            <input type="text" id="id-insp" readonly class="input-readonly">
            <label>Circuito:</label>
            <select id="circuito-insp">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
                <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            </select>
            <label>Nombre de la Inspección:</label>
            <input type="text" id="nombre-insp">
            <label>Fecha:</label>
            <input type="date" id="fecha-insp">
            <label>Tipo de Inspección:</label>
            <select id="tipo-insp">
                <option>DESPEJE</option><option>CAMARA ACÚSTICA</option><option>PROYECTO</option><option>MEJORA DE RED</option>
            </select>
            <label>Actividad:</label>
            <select id="actividad-insp">
                <option>CONTROL DE VEGETACIÓN</option><option>POSTES</option><option>CONDUCTORES</option><option>TRANSFORMADORES</option>
            </select>
            <label>Prioridad:</label>
            <select id="prioridad-insp">
                <option>ALTA</option><option>MEDIA</option><option>BAJA</option>
            </select>
            <label>Coordenada:</label>
            <div id="map-insp" style="height: 200px; border-radius: 8px;"></div>
            <p class="coords-text">Punto: <span id="coords-val-insp">0, 0</span></p>
            <button type="button" class="btn-enviar" onclick="alert('Guardado')">GUARDAR INSPECCIÓN</button>
        </form>
    </div>

    <div id="form-poda-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header><h1>PODA COMUNITARIA</h1></header>

        <form id="form-poda">
            <label>Circuito y Zona:</label>
            <input type="text" id="zona-poda">

            <div class="grid-2">
                <div><label>Hora Inicio:</label><input type="time" id="h-ini"></div>
                <div><label>Hora Final:</label><input type="time" id="h-fin"></div>
            </div>

            <label>Métricas:</label>
            <div class="grid-3">
                <input type="number" id="brecha" placeholder="M. Brecha">
                <input type="number" id="poda-m" placeholder="M. Poda">
                <input type="number" id="postes" placeholder="Postes">
            </div>

            <label>Fotos del Grupo e Identidades:</label>
            <div class="grid-3">
                <div class="foto-box"><span>GRUPO</span><input type="file" accept="image/*" capture="camera"></div>
                <div class="foto-box"><span>ID FRENTE</span><input type="file" accept="image/*" capture="camera"></div>
                <div class="foto-box"><span>ID REVERSO</span><input type="file" accept="image/*" capture="camera"></div>
            </div>

            <label>Fotos Inicio (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
            </div>
            <label>Fotos Ejecución (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
            </div>
            <label>Fotos Final (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
                <input type="file" accept="image/*" capture="camera">
            </div>

            <label>Foto Recibo de Caja:</label>
            <input type="file" accept="image/*" capture="camera">

            <label>Ubicación (Inicio y Final):</label>
            <div id="map-poda" style="height: 250px; border-radius: 8px;"></div>
            <p class="coords-text">Inicio: <span id="gps-ini">0,0</span> | Final: <span id="gps-fin">0,0</span></p>
            <div class="grid-2">
                <button type="button" class="btn-secundario" onclick="marcarGPS('ini')">MARCAR INICIO</button>
                <button type="button" class="btn-secundario" onclick="marcarGPS('fin')">MARCAR FINAL</button>
            </div>

            <button type="button" class="btn-enviar" onclick="generarPDFPoda()">GENERAR INFORME FINAL</button>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
