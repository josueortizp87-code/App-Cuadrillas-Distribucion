<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE UTCD - Gestión de Campo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://logodownload.org/wp-content/uploads/2019/08/enee-logo.png" alt="Logo ENEE" style="height: 40px;">
            <h1>SECTOR JUTICALPA</h1>
            <p>Ing. Josué Ortiz - UTCD</p>
        </header>
        <div class="card" onclick="mostrarSubmenu()">
            <i class="fas fa-tools"></i>
            <span>Mantenimiento</span>
        </div>
    </div>

    <div id="submenu-mantenimiento" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlDashboard()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header><h1>MANTENIMIENTO</h1></header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarFormulario('inspeccion')">
                <i class="fas fa-clipboard-check"></i>
                <span>Inspección</span>
            </div>
            <div class="card" onclick="mostrarFormulario('poda')">
                <i class="fas fa-leaf"></i>
                <span>Poda Comunitaria</span>
            </div>
        </div>
    </div>

    <div id="form-inspeccion-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <h2>REGISTRO DE INSPECCIÓN</h2>
        <form id="form-insp">
            <label>ID Inspección:</label>
            <input type="text" id="id-insp" readonly class="input-readonly">
            <label>Circuito:</label>
            <select id="circ-insp-sel">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
                <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            </select>
            <label>Nombre:</label>
            <input type="text" id="nombre-insp">
            <div id="map-insp" style="height: 200px; border-radius: 8px; margin-top:10px;"></div>
            <button type="button" class="btn-enviar" onclick="alert('Guardado')">GUARDAR</button>
        </form>
    </div>

    <div id="form-poda-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header><h1>INFORME DE PODA</h1></header>

        <form id="form-poda">
            <label>Circuito:</label>
            <select id="poda-circuito">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
                <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            </select>
            <label>Zona de Trabajo:</label>
            <input type="text" id="poda-zona" placeholder="Escribir ubicación">
            <label>Fecha:</label>
            <input type="date" id="poda-fecha">

            <div class="grid-2">
                <div><label>Hora Inicio:</label><input type="time" id="h-ini"></div>
                <div><label>Hora Final:</label><input type="time" id="h-fin"></div>
            </div>

            <label>Métricas Técnicas:</label>
            <div class="grid-3">
                <input type="number" id="m-brecha" placeholder="Brecha">
                <input type="number" id="m-poda" placeholder="Poda">
                <input type="number" id="m-postes" placeholder="Postes">
            </div>

            <label>Personal y Pagos:</label>
            <input type="number" id="poda-personas" placeholder="Cantidad Personas">
            <div class="grid-2">
                <input type="number" id="pago-mo" placeholder="Mano de Obra (L)">
                <input type="number" id="pago-trans" placeholder="Transporte (L)">
            </div>

            <label>Responsables:</label>
            <input type="text" id="resp-super" placeholder="Responsable Supervisión">
            <input type="text" id="resp-activ" placeholder="Responsable Actividades">

            <label>Documentación (Grupo / ID Frente / ID Revés):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" id="f-grupo">
                <input type="file" accept="image/*" id="f-id-f">
                <input type="file" accept="image/*" id="f-id-r">
            </div>

            <label>Fotos Antes (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" id="f-ini-1"><input type="file" accept="image/*" id="f-ini-2"><input type="file" accept="image/*" id="f-ini-3">
            </div>

            <label>Fotos Durante (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" id="f-eje-1"><input type="file" accept="image/*" id="f-eje-2"><input type="file" accept="image/*" id="f-eje-3">
            </div>

            <label>Fotos Después (3):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" id="f-fin-1"><input type="file" accept="image/*" id="f-fin-2"><input type="file" accept="image/*" id="f-fin-3">
            </div>

            <label>Recibo Final:</label>
            <input type="file" accept="image/*" id="f-recibo">

            <label>Ubicación GPS:</label>
            <div id="map-poda" style="height: 180px; border-radius: 8px;"></div>
            <div class="grid-2">
                <button type="button" class="btn-secundario" onclick="marcarGPS('ini')">GPS INICIO</button>
                <button type="button" class="btn-secundario" onclick="marcarGPS('fin')">GPS FINAL</button>
            </div>
            <p class="coords-text" id="coords-display">GPS: Sin marcar</p>

            <button type="button" class="btn-enviar" onclick="generarPDFPoda()">GENERAR INFORME FINAL</button>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
