<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Gestión de Distribución</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://logodownload.org/wp-content/uploads/2019/08/enee-logo.png" alt="Logo ENEE" style="height: 50px;">
            <h1>SECTOR JUTICALPA</h1>
            <p>Ing. Josué Ortiz</p>
        </header>

        <div class="grid-menu">
            <div class="card" onclick="mostrarSeccion('mantenimiento')">
                <i class="fas fa-tools"></i>
                <span>Mantenimiento</span>
            </div>
            <div class="card" onclick="mostrarSeccion('operaciones')">
                <i class="fas fa-bolt"></i>
                <span>Operaciones</span>
            </div>
            <div class="card" onclick="mostrarSeccion('poda')">
                <i class="fas fa-tree"></i>
                <span>Poda Comunitaria</span>
            </div>
            <div class="card" onclick="mostrarSeccion('combustible')">
                <i class="fas fa-gas-pump"></i>
                <span>Combustible</span>
            </div>
        </div>
    </div>

    <div id="seccion-formulario" class="container" style="display:none;">
      <button class="btn-regresar" onclick="volverAlInicio()"><i class="fas fa-arrow-left"></i> Regresar</button>
      <h2 id="titulo-actividad">Actividad</h2>

      <div id="map" style="height: 250px; border-radius: 10px; margin-bottom: 15px;"></div>

      <form id="form-inspeccion">
          <label>Circuito:</label>
          <select id="circuito">
              <option value="JUT-L379">JUT-L379</option>
              <option value="JUT-L380">JUT-L380</option>
              <option value="JUT-L381">JUT-L381</option>
              <option value="JUT-L382">JUT-L382</option>
              <option value="CAT-L375">CAT-L375</option>
              <option value="CAT-L376">CAT-L376</option>
              <option value="GMC-L377A">GMC-L377A RS-CAMPAMENTO</option>
          </select>

          <label>Buscar Material:</label>
          <input type="text" id="buscar-material" placeholder="Escribe para filtrar..." onkeyup="filtrarMateriales()">
          <select id="lista-materiales" size="5">
              </select>

          <label>Estado de la Tarea:</label>
          <div class="status-buttons">
              <button type="button" class="status-btn" onclick="cambiarEstado(this)">INICIO</button>
              <button type="button" class="status-btn active" onclick="cambiarEstado(this)">EJECUCIÓN</button>
              <button type="button" class="status-btn" onclick="cambiarEstado(this)">FINALIZADO</button>
          </div>

          <label>Observaciones:</label>
          <textarea id="obs" rows="4" placeholder="Notas del sector..."></textarea>

          <button type="button" class="btn-enviar" onclick="generarReporte()">GUARDAR REPORTE PDF</button>
      </form>
  </div>  

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
