<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE UTCD - Gestión de Campo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div id="dashboard" class="container">
        <header>
            <img src="https://logodownload.org/wp-content/uploads/2019/08/enee-logo.png" alt="Logo ENEE" style="height: 40px;">
            <h1>SECTOR JUTICALPA</h1>
            <p>Ing. Josué Ortiz - UTCD</p>
        </header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarSubmenu('mantenimiento')">
                <i class="fas fa-tools"></i>
                <span>Mantenimiento</span>
            </div>
        </div>
    </div>

    <div id="submenu-mantenimiento" class="container" style="display:none;">
        <button class="btn-regresar" onclick="volverAlDashboard()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header>
            <h1>MANTENIMIENTO</h1>
        </header>
        <div class="grid-menu">
            <div class="card" onclick="mostrarFormulario('inspeccion')">
                <i class="fas fa-clipboard-check"></i>
                <span>Inspección</span>
            </div>
            <div class="card" onclick="mostrarFormulario('poda')">
                <i class="fas fa-leaf"></i>
                <span>Poda Comunitaria</span>
            </div>
        </div>
    </div>

    <div id="form-inspeccion-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <h2>REGISTRO INSPECCIÓN</h2>
        <form id="form-insp">
            <label>ID Inspección:</label>
            <input type="text" id="id-insp" readonly class="input-readonly">
            <label>Circuito:</label>
            <select id="circ-insp">
                <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
            </select>
            <label>Nombre de Inspección:</label>
            <input type="text" id="nom-insp">
            <button type="button" class="btn-enviar" onclick="finalizarActividad('Inspección')">GUARDAR</button>
        </form>
    </div>

    <div id="form-poda-container" class="container" style="display:none;">
        <button class="btn-regresar" onclick="mostrarSubmenu()"><i class="fas fa-chevron-left"></i> VOLVER</button>
        <header>
            <h1>INFORME DE PODA</h1>
        </header>

        <form id="form-poda">
            <label>Circuito y Zona de Trabajo:</label>
            <input type="text" id="zona-poda" placeholder="Ej: Poda en Troncal RS CULMI">

            <div class="grid-2">
                <div>
                    <label>Hora Inicio:</label>
                    <input type="time" id="h-inicio">
                </div>
                <div>
                    <label>Hora Final:</label>
                    <input type="time" id="h-final">
                </div>
            </div>

            <label>Métricas:</label>
            <div class="grid-3">
                <input type="number" id="m-brecha" placeholder="M. Brecha">
                <input type="number" id="m-poda" placeholder="M. Poda">
                <input type="number" id="postes-r" placeholder="Postes">
            </div>

            <label>Personal Contratado:</label>
            <div id="lista-personal"></div>
            <button type="button" class="btn-secundario" onclick="agregarPersona()">+ AGREGAR PERSONA</button>

            <label>Transporte (L.):</label>
            <input type="number" id="pago-trans">

            <label>Fotos (Antes, Durante, Después):</label>
            <div class="grid-3">
                <input type="file" accept="image/*" capture="camera" id="f-antes">
                <input type="file" accept="image/*" capture="camera" id="f-durante">
                <input type="file" accept="image/*" capture="camera" id="f-despues">
            </div>

            <button type="button" class="btn-enviar" onclick="generarPDFPoda()">GENERAR INFORME PDF</button>
        </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
