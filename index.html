<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Zonificación de Red</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div id="form-zonificacion-container" class="container">
        <header>
            <img src="https://www.eneeutcd.hn/es/dominios/enee.pagegear.co/plantillas/2024/recursos/logo_utcd.svg"
                 alt="ENEE" style="height: 60px; background-color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <h1>SECTOR JUTICALPA - ZONIFICACIÓN</h1>
            <p>Desarrollador - Josué Ortiz</p>
        </header>

        <label>Circuito:</label>
        <select id="zonif-circuito">
            <option>JUT-L379</option><option>JUT-L380</option><option>JUT-L381</option>
            <option>JUT-L382</option><option>CAT-L375</option><option>CAT-L376</option>
            <option>GMC-L377 RS CAMPAMENTO</option>
        </select>

        <div id="map-zonif" style="height: 400px; border-radius: 10px; border: 2px solid #444; margin-top: 10px;"></div>

        <div class="grid-2" style="margin-top: 15px;">
            <button type="button" class="btn-enviar" style="background:#4a5568; color:white; margin-top:0;" onclick="abrirModalPunto('EXISTENTE')">
                <i class="fas fa-circle"></i> + EXISTENTE
            </button>
            <button type="button" class="btn-enviar" style="background:#27ae60; color:white; margin-top:0;" onclick="abrirModalPunto('PROYECTADA')">
                <i class="fas fa-plus-circle"></i> + PROYECTADA
            </button>
        </div>

        <div class="grid-2" style="margin-top: 10px;">
            <button type="button" class="btn-secundario" style="margin-top:0; border-color:#fff; color:#fff;" onclick="setModoDibujo('EXISTENTE')">
                <i class="fas fa-horizontal-rule"></i> LÍNEA NEGRA (EXIST)
            </button>
            <button type="button" class="btn-secundario" style="margin-top:0; border-color:#27ae60; color:#27ae60;" onclick="setModoDibujo('PROYECTADA')">
                <i class="fas fa-ellipsis-h"></i> LÍNEA VERDE (PROY)
            </button>
        </div>

        <div id="lista-puntos" style="margin-top:15px; color:white;">
            <h3>Levantamiento: <span id="contador-puntos">0</span> apoyos</h3>
            <ul id="ul-puntos" style="padding:0; list-style:none; font-size: 0.8em; opacity: 0.7;"></ul>
        </div>

        <button type="button" class="btn-secundario" style="width:100%; margin-top:20px; background:#e67e22;" onclick="generarPowerPoint()">
            <i class="fas fa-file-powerpoint"></i> GENERAR PPTX (PLANO + TABLAS)
        </button>
    </div>

    <div id="modal-punto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; padding:20px; overflow-y:auto;">
        <div style="background:#1a1a1a; padding:20px; border-radius:10px; max-width:500px; margin:auto;">
            <h2 id="modal-titulo" style="color:white; border-bottom: 1px solid #333; padding-bottom:10px;">Detalle del Apoyo</h2>

            <label>Num. Apoyo:</label><input type="text" id="p-apoyo">

            <label>Tipo Poste:</label>
            <select id="p-tipo-poste">
                <option>PC 30FT</option><option>PC 35FT</option><option>PC 40FT</option><option>PC 45FT</option>
                <option>PMA 30FT</option><option>PMA 35FT</option><option>PMA 40FT</option><option>PMA 45FT</option>
                <option>PME 30FT</option><option>PME 35FT</option><option>PME 40FT</option><option>PME 45FT</option>
            </select>

            <label>Estructura:</label><input type="text" id="p-estructura">

            <label>Trafo (kVA):</label>
            <select id="p-trafo">
                <option>N/A</option><option>15 kVA</option><option>25 kVA</option><option>37.5 kVA</option>
                <option>50 kVA</option><option>75 kVA</option><option>100 kVA</option>
            </select>

            <div id="campos-existente-extra">
                <label>Cant. Clientes:</label><input type="number" id="p-clientes" value="0">
                <label>Voltaje:</label><input type="text" id="p-voltaje" value="120/240V">
            </div>

            <div class="grid-2" style="margin-top:20px;">
                <button type="button" class="btn-prioridad" onclick="cerrarModal()">CANCELAR</button>
                <button type="button" class="btn-enviar" style="margin-top:0;" onclick="guardarPunto()">GUARDAR</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
