<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE - Poda Comunitaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="login-container" class="container">
    <header>
        <img src="https://www.eneeutcd.hn/es/dominios/enee.pagegear.co/plantillas/2024/recursos/logo_utcd.svg" alt="ENEE" style="height: 80px; background-color: white; padding: 10px; border-radius: 8px;">
        <h1>Acceso por Sector</h1>
    </header>
    <div class="card" style="padding: 20px;">
        <label>Sector de Trabajo:</label>
        <select id="user-sector">
            <option value="BRUS LAGUNA">BRUS LAGUNA</option>
            <option value="CHOLUTECA">CHOLUTECA</option>
            <option value="COMAYAGUA">COMAYAGUA</option>
            <option value="DANLI">DANLI</option>
            <option value="EL PROGRESO">EL PROGRESO</option>
            <option value="JUTICALPA">JUTICALPA</option>
            <option value="LA CEIBA">LA CEIBA</option>
            <option value="SAN PEDRO SULA">SAN PEDRO SULA</option>
            <option value="SANTA BARBARA">SANTA BARBARA</option>
            <option value="SANTA ROSA">SANTA ROSA</option>
            <option value="SANTA CRUZ">SANTA CRUZ</option>
            <option value="TEGUCIGALPA">TEGUCIGALPA</option>
            <option value="TOCOA">TOCOA</option>
            <option value="ADMIN">ADMINISTRADOR</option>
        </select>
        <label>Contraseña:</label>
        <input type="password" id="pass" placeholder="Ingrese contraseña">
        <button class="btn-enviar" onclick="validarLogin()">INGRESAR</button>
        <p id="login-error" style="color: #e74c3c; display: none; margin-top:10px;">Credenciales incorrectas</p>
    </div>
</div>

<div id="form-poda-container" class="container" style="display: none;">
    <header>
        <img src="https://www.eneeutcd.hn/es/dominios/enee.pagegear.co/plantillas/2024/recursos/logo_utcd.svg" alt="ENEE" style="height: 60px; background-color: white; padding: 10px; border-radius: 8px;">
        <h1 id="sector-title">PODA COMUNITARIA</h1>
    </header>

    <form id="form-poda">
        <label>CIRCUITO:</label>
        <input type="text" id="poda-circuito" placeholder="Escriba el circuito">
        
        <label>ZONA DE TRABAJO:</label>
        <input type="text" id="poda-zona">

        <label>FECHA DE TRABAJO:</label>
        <input type="date" id="poda-fecha">

        <div class="grid-2">
            <div><label>HORA INICIO:</label><input type="time" id="h-ini"></div>
            <div><label>HORA FINAL:</label><input type="time" id="h-fin"></div>
        </div>

        <label>TRABAJO EJECUTADO:</label>
        <div class="grid-3">
            <input type="number" id="m-brecha" placeholder="Brecha">
            <input type="number" id="m-poda" placeholder="Poda">
            <input type="number" id="m-postes" placeholder="Postes">
        </div>

        <label>RESPONSABLES:</label>
        <input type="text" id="resp-super" placeholder="Responsable Supervisión">
        <input type="text" id="resp-activ" placeholder="Líder de Cuadrilla">
        <input type="number" id="poda-personas" placeholder="Cantidad de Personas">

        <label>FOTOS PRINCIPALES:</label>
        <div class="grid-2">
            <div class="foto-input-group">
                <span>FOTO GRUPO</span><input type="file" id="f-grupo" onchange="previsualizar(this, 'p-f-grupo')">
                <div id="p-f-grupo" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>FOTO VEHÍCULO</span><input type="file" id="f-vehiculo" onchange="previsualizar(this, 'p-f-vehiculo')">
                <div id="p-f-vehiculo" class="preview-box"></div>
            </div>
        </div>

        <label>LÍDER DE CUADRILLA:</label>
        <div class="grid-2">
            <div class="foto-input-group">
                <span>DNI FRONTAL</span><input type="file" id="f-lider-f" onchange="previsualizar(this, 'p-f-lider-f')">
                <div id="p-f-lider-f" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>DNI REVÉS</span><input type="file" id="f-lider-r" onchange="previsualizar(this, 'p-f-lider-r')">
                <div id="p-f-lider-r" class="preview-box"></div>
            </div>
        </div>

        <label>IDENTIDAD BENEFICIARIO:</label>
        <div class="grid-2">
            <div class="foto-input-group">
                <span>DNI FRENTE</span><input type="file" id="f-id-f" onchange="previsualizar(this, 'p-f-idf')">
                <div id="p-f-idf" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>DNI REVÉS</span><input type="file" id="f-id-r" onchange="previsualizar(this, 'p-f-idr')">
                <div id="p-f-idr" class="preview-box"></div>
            </div>
        </div>

        <label>EVIDENCIA DE CAMPO (9 FOTOS):</label>
        <div class="grid-3">
            <div class="foto-input-group"><span>ANTES 1</span><input type="file" id="f-a1" onchange="previsualizar(this, 'p-a1')"><div id="p-a1" class="preview-box"></div></div>
            <div class="foto-input-group"><span>ANTES 2</span><input type="file" id="f-a2" onchange="previsualizar(this, 'p-a2')"><div id="p-a2" class="preview-box"></div></div>
            <div class="foto-input-group"><span>ANTES 3</span><input type="file" id="f-a3" onchange="previsualizar(this, 'p-a3')"><div id="p-a3" class="preview-box"></div></div>
        </div>
        <div class="grid-3">
            <div class="foto-input-group"><span>DURANTE 1</span><input type="file" id="f-d1" onchange="previsualizar(this, 'p-d1')"><div id="p-d1" class="preview-box"></div></div>
            <div class="foto-input-group"><span>DURANTE 2</span><input type="file" id="f-d2" onchange="previsualizar(this, 'p-d2')"><div id="p-d2" class="preview-box"></div></div>
            <div class="foto-input-group"><span>DURANTE 3</span><input type="file" id="f-d3" onchange="previsualizar(this, 'p-d3')"><div id="p-d3" class="preview-box"></div></div>
        </div>
        <div class="grid-3">
            <div class="foto-input-group"><span>DESPUÉS 1</span><input type="file" id="f-f1" onchange="previsualizar(this, 'p-f1')"><div id="p-f1" class="preview-box"></div></div>
            <div class="foto-input-group"><span>DESPUÉS 2</span><input type="file" id="f-f2" onchange="previsualizar(this, 'p-f2')"><div id="p-f2" class="preview-box"></div></div>
            <div class="foto-input-group"><span>DESPUÉS 3</span><input type="file" id="f-f3" onchange="previsualizar(this, 'p-f3')"><div id="p-f3" class="preview-box"></div></div>
        </div>

        <label>MAPA GPS:</label>
        <div id="map-poda" style="height: 200px; border-radius: 8px; margin-bottom: 10px;"></div>
        <div class="grid-2">
            <input type="text" id="lat-m" placeholder="Latitud">
            <input type="text" id="lng-m" placeholder="Longitud">
        </div>
        <button type="button" class="btn-secundario" onclick="setManual()">FIJAR GPS MANUAL</button>

        <div class="grid-2">
            <button type="button" class="btn-secundario" onclick="marcar('ini')">COORD. INICIAL</button>
            <button type="button" class="btn-secundario" onclick="marcar('fin')">COORD. FINAL</button>
        </div>
        <p id="c-txt" class="coords-text">Inicio: -- | Fin: --</p>

        <button type="button" class="btn-enviar" onclick="crearPDF()">GENERAR INFORME PDF</button>
    </form>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
